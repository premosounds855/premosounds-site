<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PREMO SOUNDS</title>
  <meta name="description" content="Official website of PremoSounds">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">PREMO SOUNDS</div>
  <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
  <ul class="nav-links">
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</header>

<section id="home">

  <div class="video-background">
    <iframe
      src="https://www.youtube.com/embed/vIcrVmqLmIs?autoplay=1&mute=1&loop=1&playlist=vIcrVmqLmIs&controls=0&modestbranding=1&rel=0"
      frameborder="0"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <div class="hero-content">
    <h1></h1>
  </div>

</section>
<section id="about" class="light">
  <h2>About Me</h2>
  <p>Music Producer. Creator. Visionary.</p>
</section>

<section id="contact" class="contact-section">

  <h2 class="contact-title">CONTACT ME</h2>

  <form 
    action="https://formspree.io/f/YOUR_FORM_ID" 
    method="POST"
    class="contact-form">

    <input 
      type="text" 
      name="name" 
      placeholder="NAME"
      required>

    <input 
      type="email" 
      name="email" 
      placeholder="EMAIL"
      required>

    <textarea 
      name="message" 
      placeholder="MESSAGE"
      rows="6"
      required></textarea>

    <button type="submit">SEND MESSAGE</button>

  </form>

</section>

<script src="js/main.js"></script>
</body>
</html>
